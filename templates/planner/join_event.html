{% extends 'planner/base.html' %}

{% block title %}Join Event{% endblock %}

{% block content %}
<div class="container join-event-page">
    <h2>Join an event</h2>
    <form method="post" class="join-event-form">
        {% csrf_token %}
        <div class="field-block">
            <label for="{{ form.code.id_for_label }}">Event code</label>
            {{ form.code }}
            {% if form.code.errors %}
                <div class="field-error">{{ form.code.errors|striptags }}</div>
            {% endif %}
        </div>
        <button type="submit" class="btn join-event-btn">Join event</button>
    </form>
</div>
{% endblock %}
